
services:
  # --- Event Bus & Infra Services ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: researchreel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - researchreel-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: researchreel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9095:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - researchreel-network

  # --- Multi-Model Storage Layer ---
  postgres:
    image: postgres:15-alpine
    container_name: researchreel-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: researchreel
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d researchreel"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-jammy
    container_name: researchreel-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: researchreel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: researchreel-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchreel-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - researchreel-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: researchreel-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: researchreel-redis
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data
    networks:
      - researchreel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Microservices (Skeletons / Placeholders for DDD) ---
  auth-service:
    image: node:18-alpine
    container_name: researchreel-auth-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/auth-service:/app
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://user:password@postgres:5432/researchreel
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=asdfghjklqwertyuiopzxcvbnmqwertyuiopasdfghjklzxcvbnm
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  user-profile-service:
    image: node:18-alpine
    container_name: researchreel-user-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/user-service:/app
    environment:
      - PORT=5002
      - DATABASE_URL=postgresql://user:password@postgres:5432/researchreel
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  research-paper-service:
    image: node:18-alpine
    container_name: researchreel-paper-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/paper-service:/app
    environment:
      - PORT=5003
      - DATABASE_URL=postgresql://user:password@postgres:5432/researchreel
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AWS_S3_BUCKET=researchreel-media
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  reel-service:
    image: node:18-alpine
    container_name: researchreel-reel-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/reel-service:/app
    environment:
      - PORT=5004
      - DATABASE_URL=postgresql://user:password@postgres:5432/researchreel
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  video-processing-service:
    image: node:18-alpine
    container_name: researchreel-video-worker
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/video-worker:/app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  ai-rag-service:
    build:
      context: ./backend/research_rag
      dockerfile: Dockerfile
    container_name: researchreel-ai-rag
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://user:password@postgres:5432/researchreel
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyA6noOPINn0lNHOerDmym52kI-OmRRCbx4}
      - QDRANT_URL=http://qdrant:6333
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  citation-intelligence-service:
    image: node:18-alpine
    container_name: researchreel-citation-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/citation-service:/app
    environment:
      - PORT=5007
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5007:5007"
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  recommendation-service:
    image: node:18-alpine
    container_name: researchreel-recommendation-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/recommendation-service:/app
    environment:
      - PORT=5008
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5008:5008"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  search-service:
    image: node:18-alpine
    container_name: researchreel-search-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/search-service:/app
    environment:
      - PORT=5009
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5009:5009"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  workspace-service:
    image: node:18-alpine
    container_name: researchreel-workspace-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/workspace-service:/app
    environment:
      - PORT=5010
      - MONGODB_URI=mongodb://mongodb:27017/workspace
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5010:5010"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  chat-service:
    image: node:18-alpine
    container_name: researchreel-chat-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/chat-service:/app
    environment:
      - PORT=5011
      - MONGODB_URI=mongodb://mongodb:27017/chat
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5011:5011"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  social-graph-service:
    image: node:18-alpine
    container_name: researchreel-social-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/social-service:/app
    environment:
      - PORT=5012
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5012:5012"
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  notification-service:
    image: node:18-alpine
    container_name: researchreel-notification-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/notification-service:/app
    environment:
      - PORT=5013
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5013:5013"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  leaderboard-service:
    image: node:18-alpine
    container_name: researchreel-leaderboard-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/leaderboard-service:/app
    environment:
      - PORT=5014
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5014:5014"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  analytics-service:
    image: node:18-alpine
    container_name: researchreel-analytics-service
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./services/analytics-service:/app
    environment:
      - PORT=5015
      - CLICKHOUSE_URL=http://clickhouse:8123
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "5015:5015"
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - researchreel-network

  # --- API Gateway & Frontend Routing ---
  api-gateway:
    image: nginx:alpine
    container_name: researchreel-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-profile-service
      - research-paper-service
      - reel-service
      - ai-rag-service
      - citation-intelligence-service
      - recommendation-service
      - search-service
      - workspace-service
      - chat-service
      - social-graph-service
      - notification-service
      - leaderboard-service
      - analytics-service
    networks:
      - researchreel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: researchreel-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_WSS_URL=ws://localhost:5000
    depends_on:
      - api-gateway
    networks:
      - researchreel-network

networks:
  researchreel-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  neo4j_data:
    driver: local
  elasticsearch_data:
    driver: local
  qdrant_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
