name: Research RAG CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Ensure directories
      run: |
        mkdir -p data/chroma_db data/bm25_index data/feedback data/traces data/uploads data/golden_eval
        
    - name: Run Tests
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      run: |
        # Run unit tests
        python -m pytest tests/unit
        
        # Integration tests might require API keys, so they're conditionally run
        if [ -n "$GOOGLE_API_KEY" ] && [ -n "$COHERE_API_KEY" ]; then
          python -m pytest tests/integration
        fi
