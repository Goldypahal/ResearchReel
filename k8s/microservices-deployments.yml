apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: default
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_USER: "user"
  POSTGRES_DB: "researchreel"
  REDIS_URL: "redis://redis:6379"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  MONGODB_URI: "mongodb://mongodb:27017/researchreel"
  NEO4J_URL: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  CLICKHOUSE_URL: "http://clickhouse:8123"
  QDRANT_URL: "http://qdrant:6333"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
---
# 1. Auth Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/username/auth-service:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: microservices-config
          env:
            - name: PORT
              value: "5001"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/$(POSTGRES_DB)"
---
