apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: default
data:
  nginx.conf: |
    worker_processes 4;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;

        server {
            listen 5000;

            # Auth Service Routing
            location /api/auth {
                proxy_pass http://auth-service:5001;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # User Service Routing
            location /api/users {
                proxy_pass http://user-profile-service:5002;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Research Paper Service Routing
            location /api/papers {
                proxy_pass http://research-paper-service:5003;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                client_max_body_size 200M;
            }

            # Reel Service Routing
            location /api/reels {
                proxy_pass http://reel-service:5004;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                client_max_body_size 200M;
            }

            # AI / RAG Service Routing
            location /api/ai {
                proxy_pass http://ai-rag-service:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 120s;
            }

            # Citation Service Routing
            location /api/citations {
                proxy_pass http://citation-intelligence-service:5007;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Recommendation Service Routing
            location /api/recommendations {
                proxy_pass http://recommendation-service:5008;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Search Service Routing
            location /api/search {
                proxy_pass http://search-service:5009;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Workspace Service Routing
            location /api/workspaces {
                proxy_pass http://workspace-service:5010;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Chat / Real-time Messaging Routing & WebSockets
            location /api/chat {
                proxy_pass http://chat-service:5011;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /socket.io {
                proxy_pass http://chat-service:5011;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Social Graph Service Routing
            location /api/social {
                proxy_pass http://social-graph-service:5012;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Notification Service Routing
            location /api/notifications {
                proxy_pass http://notification-service:5013;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Leaderboard Service Routing
            location /api/leaderboard {
                proxy_pass http://leaderboard-service:5014;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Analytics Service Routing
            location /api/analytics {
                proxy_pass http://analytics-service:5015;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: gateway
          image: nginx:alpine
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config-volume
          configMap:
            name: nginx-gateway-config
