apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: researchreel-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
spec:
  rules:
    - http:
        paths:
          # Route static video/thumbnail uploads serving
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
          # Route backend gateway endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
          # Route websocket endpoints
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
          # Route web client pages
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
