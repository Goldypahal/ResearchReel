
# ResearchReel — Horizontal Pod Autoscaler Manifests
# Targets: CPU utilization threshold of 70%, Memory threshold of 80%
# All workloads scale between a defined min and max replica range.

# ──────────────────────────────────────────────────────────────
# 1. API Gateway HPA
# High-priority: serves all client traffic. Scale aggressively.
# ──────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-api-gateway
  namespace: researchreel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: researchreel-gateway-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ──────────────────────────────────────────────────────────────
