apiVersion: v1
kind: Service
metadata:
  name: rag-service
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: rag-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchreel-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag
          image: ghcr.io/username/rag-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql://user:$(POSTGRES_PASSWORD)@postgres:5432/researchreel
            - name: REDIS_URL
              value: redis://redis:6379
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: gemini-api-key
            - name: QDRANT_URL
              value: https://980ec17e-1430-4eb0-87b2-92c160236a75.sa-east-1-0.aws.cloud.qdrant.io
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: qdrant-api-key
