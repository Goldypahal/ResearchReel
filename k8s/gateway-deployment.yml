apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-uploads-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchreel-gateway-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/username/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: jwt-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://user:$(POSTGRES_PASSWORD)@postgres:5432/researchreel"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: gemini-api-key
            - name: RAG_SERVICE_URL
              value: "http://rag-service:8000"
            - name: START_WORKER
              value: "false"
          volumeMounts:
            - name: media-storage
              mountPath: /app/public/uploads
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-uploads-pvc
