apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchreel-worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-worker
  template:
    metadata:
      labels:
        app: video-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/username/video-worker:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://user:$(POSTGRES_PASSWORD)@postgres:5432/researchreel"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: researchreel-secrets
                  key: gemini-api-key
            - name: START_WORKER
              value: "true"
          volumeMounts:
            - name: media-storage
              mountPath: /app/public/uploads
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-uploads-pvc
